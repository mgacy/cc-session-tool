name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - run: bun install --frozen-lockfile

      - run: bun test

      - name: Verify version matches tag
        run: |
          set -euo pipefail
          SOURCE_VERSION=$(bun -e "import { VERSION } from './index.ts'; console.log(VERSION)")
          if [ -z "$SOURCE_VERSION" ]; then
            echo "::error::Failed to extract VERSION from index.ts (got empty string)"
            exit 1
          fi
          if ! echo "$SOURCE_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Extracted VERSION is not valid semver: '$SOURCE_VERSION'"
            exit 1
          fi
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$SOURCE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: index.ts has $SOURCE_VERSION but tag is $TAG_VERSION"
            exit 1
          fi
          echo "Version verified: $SOURCE_VERSION"

      - name: Build binaries
        run: |
          set -euo pipefail
          bun build --compile --target=bun-darwin-arm64 ./index.ts --outfile cc-session-tool-darwin-arm64
          bun build --compile --target=bun-darwin-x64 ./index.ts --outfile cc-session-tool-darwin-x64
          for bin in cc-session-tool-darwin-arm64 cc-session-tool-darwin-x64; do
            if [ ! -f "$bin" ]; then
              echo "::error::Build produced no output: $bin"
              exit 1
            fi
            size=$(stat -f%z "$bin")
            if [ "$size" -lt 1000 ]; then
              echo "::error::Binary suspiciously small ($size bytes): $bin"
              exit 1
            fi
            echo "$bin: $size bytes"
          done
          lipo -create cc-session-tool-darwin-arm64 cc-session-tool-darwin-x64 -output cc-session-tool
          lipo -info cc-session-tool

      - name: Generate checksums
        run: |
          set -euo pipefail
          shasum -a 256 cc-session-tool cc-session-tool-darwin-arm64 cc-session-tool-darwin-x64 > checksums.txt
          line_count=$(wc -l < checksums.txt | tr -d ' ')
          if [ "$line_count" -ne 3 ]; then
            echo "::error::Expected 3 checksums but got $line_count"
            exit 1
          fi
          cat checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cc-session-tool
            cc-session-tool-darwin-arm64
            cc-session-tool-darwin-x64
            checksums.txt
